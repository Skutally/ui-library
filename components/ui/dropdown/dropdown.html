<!DOCTYPE html>
<html>
<head>
    <title>Dropdown</title>
</head>
<body>
      <section id="dropdown">
      <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Dropdown</h2>
      <p class="text-xs text-gray-400 mb-4 font-mono">data-controller="dropdown"</p>
      <div class="bg-white rounded-2xl border border-gray-200 p-5 flex flex-wrap gap-5">

        <div class="relative" data-controller="dropdown">
          <button data-action="click->dropdown#toggle" data-controller="button" data-button-variant-value="outline">
            Actions
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div data-dropdown-target="menu" class="hidden absolute left-0 top-full mt-2 w-44 bg-white rounded-xl border border-gray-200 shadow-xl z-20 py-1.5 text-sm">
            <a href="#" class="flex items-center gap-2.5 px-4 py-2 text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>Edit
            </a>
            <a href="#" class="flex items-center gap-2.5 px-4 py-2 text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>Duplicate
            </a>
            <div class="border-t border-gray-100 my-1"></div>
            <a href="#" class="flex items-center gap-2.5 px-4 py-2 text-red-600 hover:bg-red-50 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>Delete
            </a>
          </div>
        </div>

        <div class="relative" data-controller="dropdown">
          <button data-action="click->dropdown#toggle" data-controller="button" data-button-variant-value="default">
            Sort by
            <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div data-dropdown-target="menu" class="hidden absolute left-0 top-full mt-2 w-44 bg-white rounded-xl border border-gray-200 shadow-xl z-20 py-1.5 text-sm">
            <a href="#" class="flex items-center justify-between px-4 py-2 text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 font-medium">Newest <span class="text-indigo-500">✓</span></a>
            <a href="#" class="flex items-center px-4 py-2 text-gray-500 hover:bg-indigo-50 hover:text-indigo-700">Oldest</a>
            <a href="#" class="flex items-center px-4 py-2 text-gray-500 hover:bg-indigo-50 hover:text-indigo-700">Alphabetical</a>
            <a href="#" class="flex items-center px-4 py-2 text-gray-500 hover:bg-indigo-50 hover:text-indigo-700">Most popular</a>
          </div>
        </div>

      </div>
    </section> 
</body>
</html>
