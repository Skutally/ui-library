<!DOCTYPE html>
<html>
<head>
    <title>Modal</title>
</head>
<body>
     <section id="modal">
      <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Modal</h2>
      <p class="text-xs text-gray-400 mb-4 font-mono">data-controller="modal"</p>
      <div class="bg-white rounded-2xl border border-gray-200 p-5 flex flex-wrap gap-3">

        <!-- Form modal -->
        <div data-controller="modal">
          <button data-action="click->modal#open" data-controller="button" data-button-variant-value="default">Edit Profile</button>
          <div data-modal-target="overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" data-action="click->modal#backdrop">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
            <div data-modal-target="box" class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md">
              <div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
                <h3 class="text-base font-bold text-gray-900">Edit Profile</h3>
                <button data-action="click->modal#close" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition-all text-lg">✕</button>
              </div>
              <div class="px-6 py-4 space-y-3">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                  <input data-controller="input" data-input-variant-value="default" type="text" value="Jane Doe"/>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                  <input data-controller="input" data-input-variant-value="default" type="email" value="jane@example.com"/>
                </div>
              </div>
              <div class="flex justify-end gap-2 px-6 py-4 border-t border-gray-100">
                <button data-action="click->modal#close" data-controller="button" data-button-variant-value="outline">Cancel</button>
                <button data-action="click->modal#close" data-controller="button" data-button-variant-value="default">Save changes</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Confirm modal -->
        <div data-controller="modal">
          <button data-action="click->modal#open" data-controller="button" data-button-variant-value="destructive">Delete Item</button>
          <div data-modal-target="overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" data-action="click->modal#backdrop">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
            <div data-modal-target="box" class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm text-center p-7">
              <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </div>
              <h3 class="text-base font-bold text-gray-900 mb-1">Delete this item?</h3>
              <p class="text-sm text-gray-500 mb-6">This action cannot be undone. All data will be permanently removed.</p>
              <div class="flex gap-3">
                <button data-action="click->modal#close" data-controller="button" data-button-variant-value="outline" class="flex-1">Cancel</button>
                <button data-action="click->modal#close" data-controller="button" data-button-variant-value="destructive" class="flex-1">Delete</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>
</body>
</html>
