<!DOCTYPE html>
<html>
<head>
    <title>Toast</title>
</head>
<body>
    <section id="toast">
      <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Toast</h2>
      <p class="text-xs text-gray-400 mb-4 font-mono">data-controller="toast"</p>
      <div class="bg-white rounded-2xl border border-gray-200 p-5" data-controller="toast">
        <div data-toast-target="container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-72" aria-live="polite"></div>
        <div class="flex flex-wrap gap-2">
          <button data-action="click->toast#show" data-toast-type-param="info"    data-toast-msg-param="Here is some useful information."
            data-controller="button" data-button-variant-value="secondary">Info</button>
          <button data-action="click->toast#show" data-toast-type-param="success" data-toast-msg-param="Changes saved successfully!"
            data-controller="button" data-button-variant-value="success">Success</button>
          <button data-action="click->toast#show" data-toast-type-param="warning" data-toast-msg-param="You have unsaved changes."
            data-controller="button" data-button-variant-value="warning">Warning</button>
          <button data-action="click->toast#show" data-toast-type-param="danger"  data-toast-msg-param="Something went wrong. Try again."
            data-controller="button" data-button-variant-value="destructive">Error</button>
        </div>
      </div>
    </section>
</body>
</html>
