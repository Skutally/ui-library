<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Library - Buttons</title>

  <!-- Tailwind CDN (for quick testing) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head> 
     <section id="inputs">
      <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Input</h2>
      <p class="text-xs text-gray-400 mb-4 font-mono">data-controller="input"</p>
      <div class="bg-white rounded-2xl border border-gray-200 p-5 grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Default</label>
          <input data-controller="input" data-input-variant-value="default" type="text" placeholder="Enter value…"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">With icon</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input data-controller="input" data-input-variant-value="default" data-input-icon-value="true" type="text" placeholder="Search…"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Error</label>
          <input data-controller="input" data-input-variant-value="error" type="email" value="bad-value"/>
          <p class="mt-1 text-xs text-red-500">Please enter a valid email.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Success</label>
          <input data-controller="input" data-input-variant-value="success" type="email" value="good@example.com"/>
          <p class="mt-1 text-xs text-emerald-600">Looks good!</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Select</label>
          <select data-controller="input" data-input-variant-value="default">
            <option>Option one</option>
            <option>Option two</option>
            <option>Option three</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Disabled</label>
          <input data-controller="input" data-input-variant-value="default" disabled value="Readonly value"/>
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Textarea</label>
          <textarea data-controller="input" data-input-variant-value="default" rows="3" placeholder="Write something…"></textarea>
        </div>
      </div>
    </section>
    </body>
    </html>
