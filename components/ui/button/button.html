<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Library - Buttons</title>

  <!-- Tailwind CDN (for quick testing) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head> 
 <section id="buttons">
      <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Button</h2>
      <p class="text-xs text-gray-400 mb-4 font-mono">data-controller="button"</p>

      <!-- Variants -->
      <div class="bg-white rounded-2xl border border-gray-200 divide-y divide-gray-100">
        <div class="p-5">
          <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">Variants</p>
          <div class="flex flex-wrap gap-2">
            <button data-controller="button" data-button-variant-value="default">Default</button>
            <button data-controller="button" data-button-variant-value="destructive">Destructive</button>
            <button data-controller="button" data-button-variant-value="outline">Outline</button>
            <button data-controller="button" data-button-variant-value="secondary">Secondary</button>
            <button data-controller="button" data-button-variant-value="ghost">Ghost</button>
            <button data-controller="button" data-button-variant-value="success">Success</button>
            <button data-controller="button" data-button-variant-value="warning">Warning</button>
            <button data-controller="button" data-button-variant-value="link">Link</button>
          </div>
        </div>
        <div class="p-5">
          <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">Sizes</p>
          <div class="flex flex-wrap items-center gap-2">
            <button data-controller="button" data-button-size-value="xs">XSmall</button>
            <button data-controller="button" data-button-size-value="sm">Small</button>
            <button data-controller="button" data-button-size-value="default">Default</button>
            <button data-controller="button" data-button-size-value="lg">Large</button>
            <button data-controller="button" data-button-size-value="xl">XLarge</button>
            <button data-controller="button" data-button-size-value="icon" data-button-variant-value="default">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            </button>
          </div>
        </div>
        <div class="p-5">
          <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">States</p>
          <div class="flex flex-wrap items-center gap-2">
            <!-- Static loading -->
            <button data-controller="button" data-button-loading-value="true" data-button-loading-text-value="Saving...">Save</button>
            <!-- Click to load -->
            <button data-controller="button" data-button-variant-value="default" data-button-clickable-value="true" data-button-loading-text-value="Saving...">Click to Load</button>
            <!-- Disabled -->
            <button disabled data-controller="button" data-button-variant-value="default">Disabled</button>
            <button disabled data-controller="button" data-button-variant-value="outline">Disabled Outline</button>
          </div>
        </div>
        <div class="p-5">
          <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">With Icons</p>
          <div class="flex flex-wrap gap-2">
            <button data-controller="button" data-button-variant-value="default">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              New Item
            </button>
            <button data-controller="button" data-button-variant-value="success">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
              Upload
            </button>
            <button data-controller="button" data-button-variant-value="outline">
              Download
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            </button>
            <button data-controller="button" data-button-variant-value="destructive">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              Delete
            </button>
          </div>
        </div>
      </div>
    </section>
    </body>
    </html>
