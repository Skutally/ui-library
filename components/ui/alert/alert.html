<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Library - Alert</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
 <section id="alerts">
      <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Alert</h2>
      <p class="text-xs text-gray-400 mb-4 font-mono">data-controller="alert"</p>
      <div class="space-y-3">
        <div data-controller="alert" data-alert-variant-value="info">
          <strong>Info:</strong> Your subscription renews on December 31.
        </div>
        <div data-controller="alert" data-alert-variant-value="success">
          <strong>Success:</strong> Profile has been saved successfully.
        </div>
        <div data-controller="alert" data-alert-variant-value="warning">
          <strong>Warning:</strong> Storage usage is at 85%.
        </div>
        <div data-controller="alert" data-alert-variant-value="danger">
          <strong>Error:</strong> Connection failed. Please try again.
        </div>
      </div>
    </section>
</body>
</html>
