<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Library - Toggles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<section id="toggles">
      <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Toggle</h2>
      <p class="text-xs text-gray-400 mb-4 font-mono">data-controller="toggle"</p>
      <div class="bg-white rounded-2xl border border-gray-200 divide-y divide-gray-100">
        <div class="flex items-center justify-between px-5 py-4" data-controller="toggle">
          <div>
            <p class="text-sm font-medium text-gray-800">Dark mode</p>
            <p class="text-xs text-gray-400 mt-0.5">Switch interface theme</p>
          </div>
          <button data-action="click->toggle#flip" class="relative w-12 h-6 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2" role="switch" aria-checked="false">
            <div data-toggle-target="track" class="absolute inset-0 rounded-full bg-gray-200 transition-colors duration-200"></div>
            <div data-toggle-target="thumb" class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200"></div>
          </button>
        </div>
        <div class="flex items-center justify-between px-5 py-4" data-controller="toggle" data-toggle-checked-value="true">
          <div>
            <p class="text-sm font-medium text-gray-800">Notifications</p>
            <p class="text-xs text-gray-400 mt-0.5">Receive email updates</p>
          </div>
          <button data-action="click->toggle#flip" class="relative w-12 h-6 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2" role="switch" aria-checked="true">
            <div data-toggle-target="track" class="absolute inset-0 rounded-full bg-indigo-600 transition-colors duration-200"></div>
            <div data-toggle-target="thumb" class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200" style="transform:translateX(24px)"></div>
          </button>
        </div>
        <div class="flex items-center justify-between px-5 py-4" data-controller="toggle">
          <div>
            <p class="text-sm font-medium text-gray-800">Public profile</p>
            <p class="text-xs text-gray-400 mt-0.5">Make your profile visible</p>
          </div>
          <button data-action="click->toggle#flip" class="relative w-12 h-6 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2" role="switch" aria-checked="false">
            <div data-toggle-target="track" class="absolute inset-0 rounded-full bg-gray-200 transition-colors duration-200"></div>
            <div data-toggle-target="thumb" class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200"></div>
          </button>
        </div>
      </div>
    </section>
</body>
</html>
